<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="style.css">
  <title>BOB Extension</title>
  <meta charset="UTF-8">
</head>
<body>
  <header class="popup-header">
    <div class="header-titles">
      <h2>BOB</h2>
      <h4>Billion Of Balls</h4>
    </div>
    <div class="ball-badge" title="Balles actives sur la page">
      <span class="badge-dot"></span>
      <span id="ballCount">0</span>
    </div>
  </header>

  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="tab-controls">Controles</button>
    <button class="tab-btn" data-tab="tab-options">Options</button>
  </div>

  <div id="tab-controls" class="tab-content active">

    <p>Construire une balle :</p>

    <label for="ballSize">Taille (px):</label>
    <input type="number" id="ballSize" value="100" min="10" max="10000">

    <div id="randomColorDiv">
      <input type="checkbox" id="ballRandomColor" name="randomColor">
      <label for="ballRandomColor">Couleur aleatoire</label>
    </div>

    <label for="ballColor">Couleur :</label>
    <input type="color" id="ballColor" value="#ff0000">

    <label for="ballNumber">Nombre de balles :</label>
    <input type="number" id="ballNumber" value="1" min="1" max="1000">

    <button id="addBall" class="btn">Ajouter 1 balle</button>

    <button id="deleteBalls" class="btn">Supprimer toutes les balles</button>

    <button id="shakeBalls" class="btn">Secouer les balles</button>

  </div>
  <div id="tab-options" class="tab-content">

    <p>Options :</p>

    <div class="sliders-container">
      <div class="sliders-values-container">
        <label for="gravity">Gravité :</label>
        <span id="gravityValue">0.5</span>
      </div>
      <input type="range" id="gravity" min="0" max="10" step="0.05" value="0.5">

      <div class="sliders-values-container">
        <label for="friction">Friction :</label>
        <span id="frictionValue">0.985</span>
      </div>
      <input type="range" id="friction" min="0.8" max="1" step="0.001" value="0.985">

      <div class="sliders-values-container">
        <label for="bounce">Rebond :</label>
        <span id="bounceValue">0.8</span>
      </div>
      <input type="range" id="bounce" min="0" max="2" step="0.05" value="0.8">

      <div class="sliders-values-container">
        <label for="shake">Secousse :</label>
        <span id="shakeValue">100</span>
      </div>
      <input type="range" id="shake" min="0" max="1000" step="1" value="100">
    </div>

    <hr class="separator">

    <div class="preset-container">
      <button id="presetEarth" class="preset-btn" title="Terre">🌍 Terre</button>
      <button id="presetMoon" class="preset-btn" title="Lune">🌙 Lune</button>
      <button id="presetSpace" class="preset-btn" title="Espace">🧑‍🚀 Espace</button>
    </div>

    <hr class="separator">

    <div class="checkbox-container">
      <label for="closedTop">Toit fermé :</label>
      <input type="checkbox" id="closedTop" name="closedTop">

      <label for="ballCollisions">Collisions entre balles :</label>
      <input type="checkbox" id="ballCollisions" name="ballCollisions">
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
